<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="780" viewBox="0 0 600 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ArtRider logo">
  <!-- Outer rounded oval border -->
  <rect x="30" y="20" width="540" height="740" rx="120" ry="120" fill="none" stroke="#0A0A0A" stroke-width="8"/>

  <!-- Center area: waveform bars (rounded rectangles) -->
  <!-- Positions chosen to match original: symmetrical, central highest bar -->
  <!-- Leftmost small bar -->
  <rect x="200" y="340" width="12" height="80" rx="6" ry="6" fill="#0A0A0A"/>
  <!-- Left-mid small -->
  <rect x="228" y="310" width="12" height="140" rx="6" ry="6" fill="#0A0A0A"/>
  <!-- Left-large -->
  <rect x="256" y="270" width="12" height="220" rx="6" ry="6" fill="#0A0A0A"/>
  <!-- Center highest -->
  <rect x="292" y="230" width="14" height="300" rx="7" ry="7" fill="#0A0A0A"/>
  <!-- Right-large -->
  <rect x="324" y="270" width="12" height="220" rx="6" ry="6" fill="#0A0A0A"/>
  <!-- Right-mid -->
  <rect x="352" y="310" width="12" height="140" rx="6" ry="6" fill="#0A0A0A"/>
  <!-- Rightmost small -->
  <rect x="380" y="340" width="12" height="80" rx="6" ry="6" fill="#0A0A0A"/>

  <!-- Decorative small side ticks (to mimic original small slanted bars) -->
  <rect x="160" y="360" width="10" height="60" rx="5" transform="rotate(-12 165 390)" fill="#0A0A0A"/>
  <rect x="420" y="360" width="10" height="60" rx="5" transform="rotate(12 425 390)" fill="#0A0A0A"/>

  <!-- Brand text -->
  <text x="50%" y="720" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="48" text-anchor="middle" fill="#0A0A0A">ArtRider</text>
</svg>
