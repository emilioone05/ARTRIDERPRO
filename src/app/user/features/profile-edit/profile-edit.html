<div class="min-h-screen bg-white md:bg-gray-50 p-4 md:p-8 font-sans">
  <div class="max-w-2xl mx-auto">

    <a button (click)="goBack()" class="inline-flex items-center text-gray-600 hover:text-gray-900 mb-6 transition-colors cursor-pointer font-medium text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Volver al inicio
    </a>

    <div class="bg-white rounded-3xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07),0_10px_20px_-2px_rgba(0,0,0,0.04)] border border-gray-100 p-6 mb-6 flex flex-col md:flex-row items-center md:items-start gap-6 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-indigo-500"></div>

      <div class="relative group">
        <div class="w-24 h-24 rounded-full bg-[#8E5496] flex items-center justify-center text-white text-4xl font-light shadow-lg">
          {{ headerInfo.initial }}
        </div>
        <button class="absolute bottom-0 right-0 bg-white p-2 rounded-full shadow-md border border-gray-100 text-gray-600 hover:text-[#8E5496] transition-colors cursor-pointer group-hover:scale-110 duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>

      <div class="text-center md:text-left mt-2">
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">{{ headerInfo.name || 'Cargando...' }}</h1>
        <p class="text-gray-500 text-base mt-1">{{ headerInfo.email }}</p>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07),0_10px_20px_-2px_rgba(0,0,0,0.04)] border border-gray-100 overflow-hidden">

      <div class="px-8 pt-8 pb-4">
        <div class="bg-gray-100 p-1.5 rounded-full inline-flex w-full md:w-auto min-w-[300px]">

          <button (click)="activeTab = 'personal'"
            [class]="activeTab === 'personal'
              ? 'flex-1 md:flex-none px-6 py-2 rounded-full bg-white shadow-sm text-gray-800 font-medium text-sm transition-all text-center'
              : 'flex-1 md:flex-none px-6 py-2 rounded-full text-gray-500 hover:text-gray-700 font-medium text-sm transition-all text-center'">
            Información personal
          </button>

          <button (click)="activeTab = 'security'"
            [class]="activeTab === 'security'
              ? 'flex-1 md:flex-none px-6 py-2 rounded-full bg-white shadow-sm text-gray-800 font-medium text-sm transition-all text-center'
              : 'flex-1 md:flex-none px-6 py-2 rounded-full text-gray-500 hover:text-gray-700 font-medium text-sm transition-all text-center'">
            Seguridad
          </button>

        </div>
      </div>

      <div class="px-8 pb-8 pt-2">

        <form *ngIf="activeTab === 'personal'" [formGroup]="profileForm" (ngSubmit)="onSubmit()">

          <div class="mb-6">
            <label class="block text-gray-700 text-sm font-medium mb-2 pl-1">Nombre completo</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </span>
              <input type="text" formControlName="full_name" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-700 focus:bg-white focus:border-[#8E5496] focus:ring-2 focus:ring-purple-100 outline-none transition-all">
            </div>
            <p *ngIf="profileForm.get('full_name')?.invalid && profileForm.get('full_name')?.touched" class="text-red-500 text-xs mt-1 ml-1">El nombre es obligatorio.</p>
          </div>

          <div class="mb-6">
            <label class="block text-gray-700 text-sm font-medium mb-2 pl-1">Correo electrónico</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
              </span>
              <input type="email" formControlName="email" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 bg-gray-100 text-gray-500 cursor-not-allowed">
            </div>
          </div>

          <div class="mb-8">
            <label class="block text-gray-700 text-sm font-medium mb-2 pl-1">Tipo de cuenta</label>
            <input type="text" formControlName="role" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-100 text-gray-500 cursor-not-allowed">
            <p class="text-sm text-gray-500 mt-2 ml-1">No puedes cambiar tu tipo de cuenta después del registro</p>
          </div>

          <button type="submit" [disabled]="profileForm.invalid || loading" class="w-full bg-[#8E5496] hover:bg-[#7a4680] text-white font-semibold py-3.5 rounded-xl shadow-md shadow-purple-100 transition-all transform active:scale-[0.99] disabled:opacity-70 flex justify-center items-center gap-2">
            <span *ngIf="loading" class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
            <span *ngIf="!loading" class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                Guardar cambios
            </span>
          </button>
        </form>

        <form *ngIf="activeTab === 'security'" [formGroup]="securityForm" (ngSubmit)="onSecuritySubmit()">

          <div class="mb-6">
            <label class="block text-gray-700 text-sm font-medium mb-2 pl-1">Contraseña actual</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </span>
              <input type="password" formControlName="currentPassword" placeholder="••••••••" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-700 focus:bg-white focus:border-[#8E5496] focus:ring-2 focus:ring-purple-100 outline-none transition-all">
            </div>
            <p *ngIf="securityForm.get('currentPassword')?.invalid && securityForm.get('currentPassword')?.touched" class="text-red-500 text-xs mt-1 ml-1">Requerido para confirmar.</p>
          </div>

          <div class="mb-6">
            <label class="block text-gray-700 text-sm font-medium mb-2 pl-1">Nueva contraseña</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </span>
              <input type="password" formControlName="newPassword" placeholder="••••••••" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-700 focus:bg-white focus:border-[#8E5496] focus:ring-2 focus:ring-purple-100 outline-none transition-all">
            </div>
            <p *ngIf="securityForm.get('newPassword')?.invalid && securityForm.get('newPassword')?.touched" class="text-red-500 text-xs mt-1 ml-1">Mínimo 6 caracteres.</p>
          </div>

          <div class="mb-8">
            <label class="block text-gray-700 text-sm font-medium mb-2 pl-1">Confirmar nueva contraseña</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </span>
              <input type="password" formControlName="confirmPassword" placeholder="••••••••" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-700 focus:bg-white focus:border-[#8E5496] focus:ring-2 focus:ring-purple-100 outline-none transition-all">
            </div>
            <p *ngIf="securityForm.hasError('passwordMismatch') && securityForm.get('confirmPassword')?.touched" class="text-red-500 text-xs mt-1 ml-1">Las contraseñas no coinciden.</p>
          </div>

          <button type="submit" [disabled]="securityForm.invalid || loading" class="w-full bg-[#8E5496] hover:bg-[#7a4680] text-white font-semibold py-3.5 rounded-xl shadow-md shadow-purple-100 transition-all transform active:scale-[0.99] disabled:opacity-70 flex justify-center items-center gap-2">
            <span *ngIf="loading" class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
            <span *ngIf="!loading" class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
                Actualizar contraseña
            </span>
          </button>
        </form>

      </div>
    </div>

  </div>
</div>
