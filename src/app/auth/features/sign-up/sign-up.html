<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - Flowbite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
                950: '#172554',
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 min-h-screen">
    <section class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center">
      <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto w-full">
        <a
          href="#"
          class="flex items-center mb-6 text-2xl font-semibold text-gray-900 dark:text-white"
        >
          <img
            class="w-8 h-8 mr-2"
            src="/artrider/src/assets/images/artrider_logo.svg"
            alt="logo"
          />
          ArtRider
        </a>
        <div
          class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-lg xl:p-0 dark:bg-gray-800 dark:border-gray-700"
        >
          <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
            <div class="flex items-center flex-col gap-y-4">
              <h1
                class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white"
              >
                Crea una cuenta
              </h1>
              <app-google-button (onClick)="submitWithGoogle()" />
            </div>

            <form class="space-y-4 md:space-y-6" [formGroup]="form" (ngSubmit)="submit()">
              <div>
                <label
                  for="fullname"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >
                  Nombre completo
                </label>
                <input
                  type="text"
                  name="fullname"
                  id="fullname"
                  class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-purple-600 focus:border-purple-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  placeholder="Juan Pérez"
                  formControlName="name"
                />
              </div>

              <div>
                <label
                  for="email"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Tu correo</label
                >
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-purple-600 focus:border-purple-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  placeholder="nombre@compania.com"
                  formControlName="email"
                />
                @if(isRequired('email')){
                <small class="text-red-400">Este campo es requerido</small>
                } @if(hasEmailRequired()) {
                <small class="text-red-400">El correo debe ser valido</small>
                }
              </div>

              <div>
                <label
                  for="password"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Contraseña</label
                >
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="••••••••"
                  class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-purple-600 focus:border-purple-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  formControlName="password"
                />

                @if(isRequired('password')){
                <small class="text-red-400">Este campo es requerido</small>
                }
              </div>

              <div>
                <label
                  for="confirm-password"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Confirmar contraseña</label
                >
                <input
                  type="password"
                  name="confirm-password"
                  id="confirm-password"
                  placeholder="••••••••"
                  class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-purple-600 focus:border-purple-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  required
                />
              </div>

              <div>
                <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Tipo de cuenta</label
                >
                <div class="grid grid-cols-1 gap-4">
                  <div class="relative">
                    <input
                      class="peer hidden"
                      id="radio_1"
                      type="radio"
                      value="cliente"
                      formControlName="typeAccount"
                    />
                    <label
                      class="flex cursor-pointer rounded-lg border border-gray-300 bg-white p-4 hover:bg-gray-50 focus:outline-none peer-checked:border-purple-600 peer-checked:ring-1 peer-checked:ring-purple-600 dark:bg-gray-700 dark:border-gray-600 dark:hover:bg-gray-600 dark:peer-checked:border-purple-500 dark:peer-checked:ring-purple-500"
                      for="radio_1"
                    >
                      <div class="flex items-center justify-between w-full">
                        <div class="flex items-center">
                          <div class="text-sm">
                            <p class="font-medium text-gray-900 dark:text-white">Cliente</p>
                            <p class="text-gray-500 dark:text-gray-400">
                              Quiero alquilar equipos para mis eventos
                            </p>
                          </div>
                        </div>
                        <div class="ml-2 text-purple-600 hidden peer-checked:block">
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5"
                            viewBox="0 0 20 20"
                            fill="currentColor"
                          >
                            <path
                              fill-rule="evenodd"
                              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                              clip-rule="evenodd"
                            />
                          </svg>
                        </div>
                      </div>
                    </label>
                  </div>

                  <div class="relative">
                    <input
                      class="peer hidden"
                      id="radio_2"
                      type="radio"
                      value="proveedor"
                      formControlName="typeAccount"
                    />
                    <label
                      class="flex cursor-pointer rounded-lg border border-gray-300 bg-white p-4 hover:bg-gray-50 focus:outline-none peer-checked:border-purple-600 peer-checked:ring-1 peer-checked:ring-purple-600 dark:bg-gray-700 dark:border-gray-600 dark:hover:bg-gray-600 dark:peer-checked:border-purple-500 dark:peer-checked:ring-purple-500"
                      for="radio_2"
                    >
                      <div class="flex items-center justify-between w-full">
                        <div class="flex items-center">
                          <div class="text-sm">
                            <p class="font-medium text-gray-900 dark:text-white">Proveedor</p>
                            <p class="text-gray-500 dark:text-gray-400">
                              Quiero publicar mis equipos para alquilar
                            </p>
                          </div>
                        </div>
                        <div class="ml-2 text-purple-600 hidden peer-checked:block">
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="h-5 w-5"
                            viewBox="0 0 20 20"
                            fill="currentColor"
                          >
                            <path
                              fill-rule="evenodd"
                              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                              clip-rule="evenodd"
                            />
                          </svg>
                        </div>
                      </div>
                    </label>
                  </div>
                </div>
              </div>

              <div class="flex items-center justify-between">
                <div class="flex items-start">
                  <div class="flex items-center h-5">
                    <input
                      id="remember"
                      aria-describedby="remember"
                      type="checkbox"
                      class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-purple-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-purple-600 dark:ring-offset-gray-800"
                      required=""
                    />
                  </div>
                  <div class="ml-3 text-sm">
                    <label for="remember" class="text-gray-500 dark:text-gray-300"
                      >Recuérdame</label
                    >
                  </div>
                </div>
                <a
                  href="#"
                  class="text-sm font-medium text-purple-600 hover:underline dark:text-purple-500"
                  >¿Olvidaste tu contraseña?</a
                >
              </div>
              <button
                type="submit"
                class="w-full text-white bg-purple-600 hover:bg-purple-700 focus:ring-4 focus:outline-none focus:ring-purple-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-purple-600 dark:hover:bg-purple-700 dark:focus:ring-purple-800"
              >
                Crear cuenta
              </button>
              <p class="text-sm font-light text-gray-500 dark:text-gray-400">
                ¿Ya tienes una cuenta?
                <a
                  routerLink="/auth/sign-in"
                  href="#"
                  class="font-medium text-purple-600 hover:underline dark:text-purple-500"
                  >Inicia sesión</a
                >
              </p>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
