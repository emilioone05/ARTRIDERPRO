<div class="min-h-screen bg-gray-50 py-10">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

    <button (click)="goBack()" class="flex items-center text-sm text-gray-500 hover:text-gray-900 mb-6 transition-colors cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4 mr-1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      Volver al catálogo
    </button>

    <div class="mb-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="p-2 bg-white rounded-lg border border-gray-200 shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-900">
            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Editar equipo</h1>
      </div>
      <p class="text-gray-500 ml-12">Actualiza la información de tu equipo</p>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

      @if (isLoading()) {
        <div class="p-20 flex justify-center items-center">
             <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-600"></div>
        </div>
      } @else {

      <form [formGroup]="editForm" (ngSubmit)="onSubmit()" class="p-8">

        <div class="mb-6">
          <h2 class="text-lg font-semibold text-gray-900">Información del equipo</h2>
          <p class="text-sm text-gray-500 mt-1">Los campos marcados con * son obligatorios</p>
        </div>

        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Título *</label>
            <input
              type="text"
              formControlName="title"
              class="w-full rounded-lg border-gray-200 bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500 focus:border-transparent p-2.5 border"
            >
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Categoría *</label>
            <select
              formControlName="category"
              class="w-full rounded-lg border-gray-200 bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500 focus:border-transparent p-2.5 border"
            >
              @for (cat of categories; track cat) {
                <option [value]="cat">{{ cat }}</option>
              }
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Descripción *</label>
            <textarea
              formControlName="description"
              rows="4"
              class="w-full rounded-lg border-gray-200 bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500 focus:border-transparent p-2.5 border resize-none"
            ></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Precio por día (USD) *</label>
              <input
                type="number"
                formControlName="price_per_day"
                class="w-full rounded-lg border-gray-200 bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500 focus:border-transparent p-2.5 border"
              >
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Stock disponible *</label>
              <input
                type="number"
                formControlName="stock"
                class="w-full rounded-lg border-gray-200 bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500 focus:border-transparent p-2.5 border"
              >
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Fotos del equipo *</label>

            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors relative cursor-pointer group">
              <input
                type="file"
                (change)="onFileSelected($event)"
                accept="image/*"
                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
              >
              <div class="flex flex-col items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-gray-400 group-hover:text-purple-500 mb-2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
                </svg>
                <p class="text-sm font-medium text-gray-900">Haz clic o arrastra una imagen</p>
              </div>
            </div>

            @if (currentImageUrl()) {
              <div class="mt-4 relative w-40 h-40 rounded-lg overflow-hidden border border-gray-200">
                <img [src]="currentImageUrl()" class="w-full h-full object-cover">
                <div class="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-xs text-center py-1">
                   Imagen actual
                </div>
              </div>
            }
          </div>

        </div>

        <div class="mt-10 flex items-center justify-end gap-3 pt-6 border-t border-gray-100">
          <button
            type="button"
            (click)="goBack()"
            class="px-5 py-2.5 rounded-lg text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 cursor-pointer"
          >
            Cancelar
          </button>

          <button
            type="submit"
            [disabled]="!editForm.valid || isLoading()"
            class="px-5 py-2.5 rounded-lg text-sm font-medium text-white bg-gray-900 hover:bg-black disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
          >
            {{ isLoading() ? 'Guardando...' : 'Guardar cambios' }}
          </button>
        </div>

      </form>
      }
    </div>
  </div>
</div>
