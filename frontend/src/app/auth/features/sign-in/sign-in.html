<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Cuenta - Flowbite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
                950: '#172554',
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50  min-h-screen">
    <section class="bg-gray-50  min-h-screen flex items-center justify-center">
      <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto w-full">
        <a
          href="#"
          class="flex items-center mb-6 text-2xl font-semibold text-gray-900  "
        >
          <img class="w-20 h-20 mr-2" src="icons/artrider_logo_vector.svg" alt="logo" />
          ArtRider
        </a>
        <div
          class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-lg xl:p-0 dark:bg-gray-800 dark:border-gray-700"
        >
          <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
            <div class="flex items-center flex-col gap-y-4">
              <h1
                class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white"
              >
                Inicia Sesion
              </h1>
              <app-google-button (onClick)="submitWithGoogle()" />
            </div>
            <form class="space-y-4 md:space-y-6" [formGroup]="form" (ngSubmit)="submit()">
              <div>
                <label
                  for="email"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Tu correo</label
                >
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-purple-600 focus:border-purple-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  placeholder="nombre@compania.com"
                  formControlName="email"
                />
                @if(isRequired('email')){
                <small class="text-red-400">Este campo es requerido</small>
                } @if(hasEmailRequired()) {
                <small class="text-red-400">El correo debe ser valido</small>
                }
              </div>

              <div>
                <label
                  for="password"
                  class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                  >Contraseña</label
                >
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="••••••••"
                  class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-purple-600 focus:border-purple-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  formControlName="password"
                />

                @if(isRequired('password')){
                <small class="text-red-400">Este campo es requerido</small>
                }
              </div>

              <div class="flex items-center justify-between">
                <div class="flex items-start">
                  <div class="flex items-center h-5">
                    <input
                      id="remember"
                      aria-describedby="remember"
                      type="checkbox"
                      class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-purple-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-purple-600 dark:ring-offset-gray-800"
                      required=""
                    />
                  </div>
                  <div class="ml-3 text-sm">
                    <label for="remember" class="text-gray-500 dark:text-gray-300"
                      >Recuérdame</label
                    >
                  </div>
                </div>
                <a
                  href="#"
                  class="text-sm font-medium text-purple-600 hover:underline dark:text-purple-500"
                  >¿Olvidaste tu contraseña?</a
                >
              </div>
              <button
                type="submit"
                class="w-full text-white bg-purple-600 hover:bg-purple-700 focus:ring-4 focus:outline-none focus:ring-purple-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-purple-600 dark:hover:bg-purple-700 dark:focus:ring-purple-800"
              >
                Inicia Sesion
              </button>
              <p class="text-sm font-light text-gray-500 dark:text-gray-400">
                ¿Aún no tienes una cuenta?
                <a
                  routerLink="/auth/sign-up"
                  href="#"
                  class="font-medium text-purple-600 hover:underline dark:text-purple-500"
                  >Crea tu cuenta</a
                >
              </p>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
